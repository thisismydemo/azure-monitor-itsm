site_name: Azure Monitor → ServiceNow Integration
site_description: Fully automated, repeatable solution connecting Azure Monitor alerts to ServiceNow using Logic Apps — based on John Joyner's (Microsoft MVP) guide.
site_url: https://thisismydemo.cloud/azure-monitor-itsm/
repo_url: https://github.com/thisismydemo/azure-monitor-itsm
repo_name: thisismydemo/azure-monitor-itsm
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Why Not the ITSM Connector?: why-not-itsm-connector.md
  - Deployment:
    - Overview: deployment-guide.md
    - John Joyner's Guide (Manual): deploy-john-joyner.md
    - Bicep: deploy-bicep.md
    - Terraform: deploy-terraform.md
    - Ansible: deploy-ansible.md
    - PowerShell / Azure CLI: deploy-powershell.md
    - CI/CD Pipelines: deploy-cicd.md
  - ServiceNow PDI Setup: servicenow-pdi-setup.md

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - tables
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/thisismydemo/azure-monitor-itsm
  analytics:
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/thumb-up-outline
          name: This page was helpful
          data: 1
          note: Thanks for your feedback!
        - icon: material/thumb-down-outline
          name: This page could be improved
          data: 0
          note: Thanks for letting us know!

copyright: Based on <a href="https://blog.johnjoyner.net">John Joyner's</a> Logic App ITSM guide
